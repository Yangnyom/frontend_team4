<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>조성윤의 꿈</title>
    <style>
        .card {
            position: relative; 
            width: 320px;
        }

        .badge {
            position: absolute; 
            top: 10px; 
            right: 10px; 
            background: red; 
            color: white; 
            padding: 5px;
        }

        .cc {
            text-align: center;
        }

        .dream {
            border: 2px solid black; 
            padding: 10px; 
            margin-top: 10px; 
            position: relative;
        }

        .secret-memo {
            visibility: hidden; 
            position: absolute; 
            bottom: 5px; 
            right: 5px; 
            background: yellow; 
            padding: 5px; 
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="card">

        <!-- 배지 -->
        <div class="badge">Hot🔥</div>

        <div style="border: 2px solid red; width: 300px;"></div>

        <div class="cc">
            <img 
            src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=500&auto=format&fit=crop&q=60" 
            alt="바다 풍경"
            style="width: 300px;">
        </div>

        <!-- ⭐ 꿈 박스 -->
        <div class="dream"
        onmouseover="this.querySelector('.secret-memo').style.visibility='visible'"
        onmouseout="this.querySelector('.secret-memo').style.visibility='hidden'">

            <div align="center">
                <h2>✨ 성윤의 꿈</h2>
                <p>💻 1. ITQ 자격증 따기</p>
                <p>&#128200; 2. 학점 평균 이상으로 유지하기</p>
                <p>🌊 3. 바다 보러가기</p>
            </div>

            <!-- 비밀 메모 -->
            <div class="secret-memo">
                🤫 TMI: 바다에서 수영을 한 번도 안 해봤어요
            </div>

        </div>

    </div>
</body>
</html>
