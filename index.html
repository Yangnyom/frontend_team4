<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>김도연의 버킷리스트 카드</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <style>
        /* 기본 카드 디자인 (교수님 제공 뼈대) */
        .card {
            width: 300px;
            margin: 50px auto;
            background: linear-gradient(135deg, #fffcf0 0%, #fff3b0 100%);
            padding: 15px 15px 35px 15px;
            border-radius: 2px 2px 15px 5px;
            box-shadow: 3px 5px 15px rgba(0,0,0,0.15);
            /* 배지의 기준점이 되기 위한 필수 속성 */
            position: relative; 
            
            /* 전체 글꼴을 나눔펜글씨로 설정 */
            font-family: 'Nanum Pen Script', cursive;
        }

        /* [필수 1] 배지 (Position: absolute 활용) */
        .badge {
            position: absolute;
            top: -10px;  /* 카드의 위쪽 경계 밖으로 살짝 나가게 */
            right: -10px; /* 카드의 오른쪽 경계 밖으로 살짝 나가게 */
            background-color: #3ae374; /* 상큼한 초록색 */
            color: #333;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            /* 살짝 기울여서 재미를 줍니다 */
            transform: rotate(15deg);
            z-index: 10; /* 다른 요소보다 위에 보이게 */
        }

        /* 카드 이미지 스타일 */
        .card img { 
            width: 100%; 
            height: 200px; 
            object-fit: cover; /* 이미지가 비율에 맞게 꽉 차도록 */
            border-radius: 5px; 
            margin-bottom: 15px; 
        }

        /* 제목 및 텍스트 스타일 */
        .card h2 { color: #2c3e50; font-size: 2rem; margin-bottom: 15px; text-align: center; }
        .card p { color: #444; font-size: 1.5rem; line-height: 1.6; margin-left: 10px;}

        /* [필수 2] 비밀 메모 (Visibility 활용) */
        .tmi-memo {
            margin-top: 20px;
            padding: 15px;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 8px;
            border-left: 5px solid #2c3e50;
            font-size: 1.3rem;
            color: #e056fd; /* 눈에 띄는 색상 */
            text-align: center;
            
            /* [과제 핵심] 처음에는 숨겨둠 */
            visibility: hidden; 
            opacity: 0; /* 서서히 나타나는 효과를 위해 추가 */
            transition: all 0.4s ease; /* 부드러운 전환 효과 */
        }

        /* [과제 핵심] 카드에 마우스를 올렸을 때(:hover) 메모가 나타남 */
        .card:hover .tmi-memo {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="badge">Success! ✅</div>

        <img src="후추사진.jpg" alt="도연님의 귀여운 고양이">
        
        <h2>✨ 김도연의 꿈</h2>
        <p>🎮 1. 롤 다이아 찍기 =^모^=</p>
        <p>✈️ 2. 친구들이랑 여행가기</p>

        <div class="tmi-memo">
            🤫 (TMI) 우리집 고양이는 무려 8kg 뚱냥이 🐈
        </div>
    </div>

</body>
</html>
